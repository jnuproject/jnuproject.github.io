<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4x3 슬라이딩 퍼즐</title>
<style>
  body {
    font-family: 'Pretendard', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background: linear-gradient(135deg, #e0f7fa, #fff9c4);
    min-height: 100vh;
    box-sizing: border-box;
  }

  h1 {
    margin-bottom: 20px;
    color: #00796b;
    text-align: center;
  }

  #puzzle {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 5px;
    width: 90vw;
    max-width: 480px;
    aspect-ratio: 4 / 3;
    background: #ffffffaa;
    border-radius: 15px;
    box-shadow: 0 8px 15px rgba(0,0,0,0.2);
  }

  .piece {
    width: 100%;
    height: 100%;
    background-size: 400px 300px; /* 이미지 전체 크기 */
    border-radius: 10px;
    box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .piece:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
  }

  .empty {
    background: none;
    box-shadow: none;
    cursor: default;
  }
</style>
</head>
<body>
<h1>4x3 슬라이딩 퍼즐</h1>
<div id="puzzle"></div>

<script>
const rows = 3;
const cols = 4;
const imageURL = '1234.jpg'; // 같은 폴더에 이미지

// 퍼즐 상태 배열 (0~11, 마지막은 빈칸)
let positions = [];
for(let i=0; i<rows*cols-1; i++) positions.push(i);
positions.push(null); // 마지막 한 칸 빈칸

// 셔플 함수
function shuffle(array) {
  for(let i=array.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}
shuffle(positions);

const puzzle = document.getElementById('puzzle');

function render() {
  puzzle.innerHTML = '';
  positions.forEach((p, index) => {
    const div = document.createElement('div');
    div.classList.add('piece');
    if(p === null){
      div.classList.add('empty');
    } else {
      const r = Math.floor(p / cols);
      const c = p % cols;
      div.style.backgroundImage = `url(${imageURL})`;
      div.style.backgroundPosition = `-${c*100}px -${r*100}px`;
    }
    div.dataset.index = index;
    puzzle.appendChild(div);
  });
}

puzzle.addEventListener('click', (e) => {
  if(!e.target.classList.contains('piece') || e.target.classList.contains('empty')) return;
  const idx = Number(e.target.dataset.index);
  const emptyIdx = positions.indexOf(null);

  const emptyRow = Math.floor(emptyIdx / cols);
  const emptyCol = emptyIdx % cols;
  const clickedRow = Math.floor(idx / cols);
  const clickedCol = idx % cols;

  // 상하좌우 이동만 허용
  if((Math.abs(emptyRow - clickedRow) + Math.abs(emptyCol - clickedCol)) === 1){
    [positions[idx], positions[emptyIdx]] = [positions[emptyIdx], positions[idx]];
    render();
    checkComplete();
  }
});

function checkComplete(){
  for(let i=0; i<rows*cols-1; i++){
    if(positions[i] !== i) return;
  }
  alert("🎉 퍼즐 완성! 🎉");
}

render();
</script>
</body>
</html>
