<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>음식 추천 시스템</title>
<style>
  
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden !important;
  }

  /* 전체 스타일 */
  body {
    font-family: "Pretendard", sans-serif;
    background-image: url("butterfly.png");
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding-top: 60px;
    margin: 0;
  }

  /* 배경 위 반투명 오버레이 */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: rgba(255,255,255,0.7);
    z-index: -1;
  }

  h1 {
    margin-bottom: 25px;
    color: #00a99c;
    font-size: 2em;
    text-align: center;
  }

  .category-group {
    margin: 10px 0;
    display: flex;
    flex-wrap: nowrap;
    justify-content: space-between;
    gap: 8px;
    overflow: hidden; /* ✅ 내부 스크롤도 차단 */
    padding-bottom: 5px;
  }

  .category-group button {
    background-color: white;
    border: 2px solid #00a99c;
    color: #00a99c;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 1em;
    cursor: pointer;
    transition: 0.25s;
    flex: 0 0 auto;
    min-width: 60px;
    text-align: center;
    width: clamp(60px, 10vw, 120px);
  }

  .category-group button:hover {
    background-color: #98d2c6;
  }

  .category-group button.active {
    background-color: #00a99c;
    color: white;
  }

  #recommendBtn {
    margin-top: 30px;
    background-color: #00a99c;
    color: white;
    font-size: 1.2em;
    border: none;
    padding: 16px 36px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
  }

  #recommendBtn:hover {
    background-color: #009688;
  }

  /* 모달 */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    padding: 10px;
    box-sizing: border-box;
  }

  .modal-content {
    background-color: white;
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 480px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    animation: fadeIn 0.4s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-content h2 {
    color: #00a99c;
    margin-bottom: 10px;
  }

  .food-name {
    font-size: 2em;
    font-weight: bold;
    color: #333;
    margin-bottom: 20px;
    word-break: keep-all;
  }

  .partner-title {
    margin-top: 20px;
    color: #00a99c;
    font-weight: 600;
    font-size: 1.1em;
  }

  .partner-list {
    text-align: left;
    margin-top: 10px;
    padding-left: 15px;
  }

  .partner-item {
    margin: 6px 0;
    line-height: 1.4;
    font-size: 0.95em;
  }

  .close {
    margin-top: 20px;
    background-color: #E0E0E0;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
  }

  .close:hover {
    background-color: #BDBDBD;
  }

  /* 모바일 대응 */
  @media (max-width: 340px) {
    .modal-content {
      width: 95%;
      padding: 15px;
    }

    h1 {
      font-size: 1.3em;
    }

    .category-group button {
      padding: 6px 10px;
      font-size: 0.8em;
      min-width: 50px;
    }

    #recommendBtn {
      padding: 10px 20px;
      font-size: 0.9em;
    }

    .food-name {
      font-size: 1.4em;
    }

    .partner-title {
      font-size: 0.95em;
    }

    .partner-item {
      font-size: 0.8em;
    }
  }
</style>
</head>
<body>

<h1>🍽 오늘 뭐 먹지?</h1>

<!-- 카테고리 선택 -->
<div class="category-group" id="mainCategory">
  <button>전체</button>
  <button>식사</button>
  <button>요리</button>
  <button>간식</button>
</div>

<div class="category-group" id="foodType">
  <button>전체</button>
  <button>한식</button>
  <button>중식</button>
  <button>일식</button>
  <button>양식</button>
</div>

<div class="category-group" id="situation">
  <button>혼밥</button>
  <button>친구</button>
  <button>연인</button>
  <button>가족</button>
  <button>모임</button>
</div>

<!-- 추천 버튼 -->
<button id="recommendBtn">추천받기 🍴</button>

<!-- 모달창 -->
<div class="modal" id="foodModal">
  <div class="modal-content">
    <h2>오늘의 추천 음식 🍱</h2>
    <div class="food-name" id="foodName">랜덤 음식</div>

    <div class="partner-title">제휴 음식점</div>
    <div class="partner-list" id="partnerList"></div>

    <button class="close" id="closeBtn">닫기</button>
  </div>
</div>

<script>
  // 카테고리 버튼 세팅
  function setupCategory(groupId) {
    const buttons = document.querySelectorAll(`#${groupId} button`);
    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });
  }

  setupCategory("mainCategory");
  setupCategory("foodType");
  setupCategory("situation");

  // 음식 데이터
  const foodData = {
    "한식": ["김치찌개", "비빔밥", "불고기", "된장찌개", "삼겹살", "갈비탕"],
    "중식": ["짜장면", "짬뽕", "탕수육", "마파두부"],
    "일식": ["초밥", "라멘", "규동", "가츠동"],
    "양식": ["파스타", "스테이크", "피자", "오믈렛"],
    "아시아": ["팟타이", "나시고랭", "쌀국수", "카레라이스"],
    "전체": ["김치찌개", "짜장면", "초밥", "파스타", "팟타이", "불고기", "짬뽕"]
  };

  // 제휴 음식점 데이터
  const partners = {
    "짬뽕": [
      { name: "홍콩반점 0410", address: "서울 강남구 테헤란로 120" },
      { name: "차이나문", address: "서울 마포구 독막로 32" },
      { name: "화룡각", address: "서울 송파구 백제고분로 85" }
    ],
    "김치찌개": [
      { name: "청진동 해장국", address: "서울 종로구 청진동 123" },
      { name: "한솥밥집", address: "서울 강서구 공항대로 32" }
    ],
    "파스타": [
      { name: "빠네하우스", address: "서울 서초구 강남대로 230" },
      { name: "라파엘로", address: "서울 용산구 회나무로 56" }
    ],
    "불고기": [
      { name: "명동불고기", address: "서울 중구 명동길 22" },
      { name: "한우정", address: "서울 송파구 석촌호수로 134" }
    ]
  };

  const recommendBtn = document.getElementById("recommendBtn");
  const modal = document.getElementById("foodModal");
  const closeBtn = document.getElementById("closeBtn");
  const foodName = document.getElementById("foodName");
  const partnerList = document.getElementById("partnerList");

  recommendBtn.addEventListener("click", () => {
    const selectedType = document.querySelector("#foodType button.active")?.textContent || "전체";
    const foods = foodData[selectedType] || foodData["전체"];

    foodName.textContent = "🎲 뽑는 중...";
    partnerList.innerHTML = "";
    modal.style.display = "flex";

    let i = 0;
    const interval = setInterval(() => {
      const randomFood = foods[Math.floor(Math.random() * foods.length)];
      foodName.textContent = randomFood;
      i++;
    }, 80);

    setTimeout(() => {
      clearInterval(interval);
      const finalFood = foods[Math.floor(Math.random() * foods.length)];
      foodName.textContent = finalFood;

      const list = partners[finalFood] || [{ name: "제휴 준비 중", address: "조만간 업데이트 예정" }];
      partnerList.innerHTML = list.map(
        p => `<div class="partner-item">🍴 <strong>${p.name}</strong><br>${p.address}</div>`
      ).join("");
    }, 800);
  });

  closeBtn.addEventListener("click", () => modal.style.display = "none");
  window.addEventListener("click", (e) => { if(e.target === modal) modal.style.display = "none"; });
</script>

</body>
</html>
