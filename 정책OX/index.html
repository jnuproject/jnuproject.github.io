<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>정책 OX 퀴즈</title>
    <style>
        /* CSS 코드 */
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Poppins:wght@600;700&display=swap');

        :root {
            --bg-color: #2c3e50;
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --text-color: #ecf0f1;
            --card-color: #34495e;
        }

        body {
            font-family: 'Jua', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a202c;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            width: 100%;
            height: 100%;
            max-width: 420px;
            max-height: 800px;
            background-color: var(--bg-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            display: flex;
        }

        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: var(--bg-color);
            z-index: 10;
            transition: opacity 0.5s;
            padding: 20px;
            box-sizing: border-box;
            color: var(--text-color);
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .screen h1 {
            font-size: 3em;
            margin-bottom: 10px;
            font-family: 'Poppins', sans-serif;
        }

        .screen p {
            font-size: 1.2em;
        }

        .screen button {
            margin-top: 30px;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            background-color: var(--primary-color);
            color: var(--text-color);
            font-size: 1.5em;
            font-family: 'Jua', sans-serif;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .screen button:hover {
            transform: scale(1.05);
        }

        #result-screen h2 {
            font-size: 4em;
            color: var(--primary-color);
            margin: 10px 0;
        }

        #game-screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            color: var(--text-color);
        }

        #header-ui {
            display: flex;
            justify-content: space-between;
            padding: 20px;
        }

        .stat-box {
            background-color: rgba(0,0,0,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box span {
            display: block;
        }

        .stat-box span:first-child {
            font-size: 0.9em;
            opacity: 0.7;
        }

        .stat-box span:last-child {
            font-size: 1.8em;
            font-family: 'Poppins', sans-serif;
        }

        #combo-display, #fever-display {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5em;
            font-family: 'Poppins', sans-serif;
            color: #f1c40f;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            animation: bounce 0.5s;
        }

        #fever-display {
            font-size: 4em;
            animation: fever-glow 1s infinite alternate;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.2); }
        }

        @keyframes fever-glow {
            from { text-shadow: 0 0 10px #f1c40f, 0 0 20px #f1c40f; }
            to { text-shadow: 0 0 20px #f1c40f, 0 0 40px #f1c40f; }
        }

        #card-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        #card {
            width: 100%;
            min-height: 300px;
            background-color: var(--text-color);
            color: var(--bg-color);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            font-size: 1.8em;
            position: relative;
            transition: transform 0.3s ease-out, opacity 0.3s;
        }

        #card-text {
            margin: 0;
            z-index: 1; /* 텍스트가 피드백 영역 위에 오도록 설정 */
        }

        #feedback-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 15px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.8em;
            padding: 20px;
            box-sizing: border-box;
        }
        
        #feedback-area.show {
            opacity: 1;
            z-index: 2;
        }

        #feedback-area.fact {
            background-color: rgba(46, 204, 113, 0.9);
            color: white;
        }

        #feedback-area.fake {
            background-color: rgba(231, 76, 60, 0.9);
            color: white;
        }
        
        #feedback-text {
            margin-top: 10px;
        }
        
        #feedback-icon {
            font-size: 2em;
        }

        #control-area {
            display: flex;
            height: 150px;
        }

        .control-btn {
            flex: 1;
            border: none;
            font-size: 3em;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #btn-x {
            background-color: var(--danger-color);
        }

        #btn-o {
            background-color: var(--success-color);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
        }

        .hidden {
            display: none !important;
        }

        /* ▼▼▼▼▼ 추가된 CSS ▼▼▼▼▼ */
        #wrong-answers-container {
            width: 100%;
            margin-top: 20px;
            text-align: left;
        }

        #wrong-answers-list {
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 10px 15px;
            margin-top: 10px;
            max-height: 200px; /* 목록이 길어지면 스크롤 생성 */
            overflow-y: auto;
            font-size: 0.8em;
        }

        .wrong-answer-item {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .wrong-answer-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .wrong-answer-item .question {
            font-weight: bold;
            color: var(--text-color);
            margin: 0 0 5px 0;
        }

        .wrong-answer-item .explanation {
            color: #bdc3c7;
            margin: 0;
        }
        /* ▲▲▲▲▲ 추가된 CSS ▲▲▲▲▲ */
    </style>
</head>
<body>
    <div id="game-container">
        <div id="game-screen">
            <div id="header-ui">
                <div class="stat-box">
                    <span>TIME</span>
                    <span id="time-display">60</span>
                </div>
                <div class="stat-box">
                    <span>SCORE</span>
                    <span id="score-display">0</span>
                </div>
            </div>

            <div id="combo-display" class="hidden">COMBO x<span>2</span></div>
            <div id="fever-display" class="hidden">FEVER TIME!</div>

            <div id="card-area">
                <div id="card">
                    <p id="card-text">정책 OX 퀴즈를 시작합니다!</p>
                    <div id="feedback-area" class="hidden">
                        <span id="feedback-icon"></span>
                        <span id="feedback-text"></span>
                    </div>
                </div>
            </div>

            <div id="control-area">
                <button id="btn-x" class="control-btn">X</button>
                <button id="btn-o" class="control-btn">O</button>
            </div>
        </div>

        <div id="intro-screen" class="screen">
            <h1>정책 OX 퀴즈</h1>
            <p>핵심 정책들을 퀴즈로 다시 확인해보세요!</p>
            <button id="start-btn">START</button>
        </div>
        
        <div id="result-screen" class="screen hidden">
            <h1>GAME OVER</h1>
            <p>최종 점수</p>
            <h2 id="final-score">0</h2>
            
            <div id="wrong-answers-container" class="hidden">
                <h3>다시 확인해 보세요! 👇</h3>
                <div id="wrong-answers-list"></div>
            </div>

            <button id="restart-btn">다시 도전하기</button>
        </div>
        </div>
    <script>
        // --- JavaScript 코드 ---
        let audioCtx;

        function playSound(type) {
            // ... (생략) ...
        }

        const QUIZ_DATA = [
            { question: "국무총리는 10년마다 청년정책의 기본계획을 수립·시행한다.", answer: false, explanation: "X! 청년기본법에 따라 국무총리는 5년마다 청년정책 기본계획을 수립해야 합니다." },
            { question: "2025년부터 모든 상장사는 '기업가치 제고 계획'을 의무적으로 공시해야 한다.", answer: false, explanation: "X! '기업 밸류업 프로그램'의 일환으로, 자율 공시를 원칙으로 합니다." },
            { question: "K-패스는 대중교통 이용 금액의 최소 20%를 환급해주는 교통카드이다.", answer: true, explanation: "O! 일반 20%, 청년 30%, 저소득층은 53%를 환급받습니다." },
            { question: "늘봄학교는 초등학교 1학년 학생들만 이용할 수 있다.", answer: false, explanation: "X! 2025년부터는 모든 초등학생이 이용할 수 있도록 단계적으로 확대될 예정입니다." },
            { question: "2025년 최저임금은 시간당 10,000원을 넘었다.", answer: false, explanation: "X! 2025년 최저임금은 9,860원으로 결정되었습니다. (본 퀴즈는 2024년 10월 기준으로 작성됨)" },
            { question: "부모급여는 아이의 나이와 상관없이 매달 동일한 금액이 지급된다.", answer: false, explanation: "X! 0세 아동은 월 100만원, 1세 아동은 월 50만원으로 차등 지급됩니다." },
            { question: "신생아 특별공급은 혼인 여부와 관계없이 출산 가구라면 누구나 신청할 수 있다.", answer: true, explanation: "O! 입주자모집 공고일로부터 2년 이내 임신 또는 출산한 가구를 대상으로 합니다." },
            { question: "대출 갈아타기 서비스는 신용대출에만 한정하여 이용할 수 있다.", answer: false, explanation: "X! 신용대출뿐만 아니라 주택담보대출, 전세대출로도 서비스가 확대되었습니다." },
            { question: "2025년부터 50인 미만 사업장에도 중대재해처벌법이 적용된다.", answer: true, explanation: "O! 2024년 1월 27일부터 5인 이상 50인 미만 사업장까지 확대 적용되었습니다." },
            { question: "근로장려금은 소득이 낮은 가구라면 재산과 상관없이 신청할 수 있다.", answer: false, explanation: "X! 소득 요건과 함께 가구원 전체의 재산 합계액이 2.4억 원 미만이어야 합니다." },
        ];
        
        const introScreen = document.getElementById('intro-screen');
        const gameScreen = document.getElementById('game-screen');
        const resultScreen = document.getElementById('result-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const timeDisplay = document.getElementById('time-display');
        const scoreDisplay = document.getElementById('score-display');
        const finalScore = document.getElementById('final-score');
        const cardText = document.getElementById('card-text');
        const cardEl = document.getElementById('card');
        const btnO = document.getElementById('btn-o');
        const btnX = document.getElementById('btn-x');
        const comboDisplay = document.getElementById('combo-display');
        const feverDisplay = document.getElementById('fever-display');
        const feedbackArea = document.getElementById('feedback-area');
        const feedbackIcon = document.getElementById('feedback-icon');
        const feedbackText = document.getElementById('feedback-text');
        
        // ▼▼▼▼▼ 수정된 JavaScript ▼▼▼▼▼
        const wrongAnswersContainer = document.getElementById('wrong-answers-container');
        const wrongAnswersList = document.getElementById('wrong-answers-list');

        let score, timer, timeLeft, combo, currentQuiz, quizPool, isFever;
        let wrongAnswers; // 틀린 문제를 저장할 배열

        function init() {
            score = 0;
            timeLeft = 60;
            combo = 0;
            isFever = false;
            quizPool = shuffle([...QUIZ_DATA]);
            wrongAnswers = []; // 게임 시작 시 초기화
            
            introScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            gameScreen.style.opacity = 1;
            
            // 다시 시작할 때 틀린 문제 목록 숨기기
            wrongAnswersContainer.classList.add('hidden');
            wrongAnswersList.innerHTML = '';

            updateScore();
            updateComboDisplay();
            timeDisplay.textContent = timeLeft;
            nextQuiz();

            timer = setInterval(updateTimer, 1000);
        }

        // ... (updateTimer, nextQuiz 함수는 변경 없음) ...
        function updateTimer() {
            timeLeft--;
            timeDisplay.textContent = timeLeft;
            if (timeLeft <= 0) {
                gameOver();
            }
        }
        function nextQuiz() {
            if (quizPool.length === 0) {
                gameOver();
                return;
            }
            currentQuiz = quizPool.pop();
            cardText.textContent = currentQuiz.question;
            cardEl.style.transform = 'translateX(0)';
            cardEl.style.opacity = 1;
            cardText.classList.remove('hidden');
            feedbackArea.classList.add('hidden');
            setButtons(false);
        }


        function handleAnswer(userAnswer) {
            setButtons(true);
            const isCorrect = userAnswer === currentQuiz.answer;
            
            showFeedback(isCorrect);
            
            setTimeout(() => {
                let scoreToAdd = isCorrect ? 100 : -50;
                if(isFever) scoreToAdd *= 2;

                score += scoreToAdd;
                if (score < 0) score = 0;

                if (isCorrect) {
                    playSound('correct');
                    combo++;
                    if (combo > 0 && combo % 5 === 0) {
                        playSound('combo');
                        startFever();
                    }
                } else {
                    playSound('wrong');
                    combo = 0;
                    wrongAnswers.push(currentQuiz); // 틀렸을 경우, 배열에 추가
                }

                updateScore();
                updateComboDisplay();

                cardEl.style.transform = `translateX(${isCorrect ? (userAnswer ? '100%' : '-100%') : (userAnswer ? '-100%' : '100%')})`;
                cardEl.style.opacity = 0;
                
                setTimeout(nextQuiz, 500);
            }, 1500);
        }

        // ... (showFeedback, startFever 함수는 변경 없음) ...
        function showFeedback(isCorrect) {
            cardText.classList.add('hidden'); // 원래 질문 숨기기
            feedbackArea.classList.remove('hidden', 'fact', 'fake');
            
            if (isCorrect) {
                feedbackIcon.textContent = "O (정답)";
                feedbackArea.classList.add('fact');
            } else {
                feedbackIcon.textContent = "X (오답)";
                feedbackArea.classList.add('fake');
            }
            feedbackText.textContent = currentQuiz.explanation;
            feedbackArea.classList.add('show');
        }

        function startFever() {
            isFever = true;
            feverDisplay.classList.remove('hidden');
            setTimeout(() => {
                isFever = false;
                feverDisplay.classList.add('hidden');
            }, 5000);
        }


        function gameOver() {
            clearInterval(timer);
            finalScore.textContent = score;
            
            // 틀린 문제가 있으면 목록을 만들어서 보여줌
            if (wrongAnswers.length > 0) {
                wrongAnswersContainer.classList.remove('hidden');
                wrongAnswers.forEach(item => {
                    const itemEl = document.createElement('div');
                    itemEl.className = 'wrong-answer-item';
                    
                    const questionEl = document.createElement('p');
                    questionEl.className = 'question';
                    questionEl.textContent = `Q. ${item.question}`;
                    
                    const explanationEl = document.createElement('p');
                    explanationEl.className = 'explanation';
                    explanationEl.textContent = item.explanation;
                    
                    itemEl.appendChild(questionEl);
                    itemEl.appendChild(explanationEl);
                    wrongAnswersList.appendChild(itemEl);
                });
            }

            resultScreen.classList.remove('hidden');
            gameScreen.style.opacity = 0;
        }

        // ... (updateScore, updateComboDisplay, setButtons, shuffle 함수는 변경 없음) ...
        function updateScore() {
            scoreDisplay.textContent = score;
        }

        function updateComboDisplay() {
            if (combo > 1) {
                comboDisplay.classList.remove('hidden');
                comboDisplay.querySelector('span').textContent = combo;
                comboDisplay.style.animation = 'none';
                void comboDisplay.offsetWidth;
                comboDisplay.style.animation = 'bounce 0.5s';
            } else {
                comboDisplay.classList.add('hidden');
            }
        }

        function setButtons(disabled) {
            btnO.disabled = disabled;
            btnX.disabled = disabled;
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }


        startBtn.addEventListener('click', () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            init();
        });

        restartBtn.addEventListener('click', init);
        btnO.addEventListener('click', () => handleAnswer(true));
        btnX.addEventListener('click', () => handleAnswer(false));
        // ▲▲▲▲▲ 수정된 JavaScript ▲▲▲▲▲
    </script>
</body>
</html>
