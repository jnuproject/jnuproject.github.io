<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Survivors</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #e6f5f2 0%, #d4ebe7 100%);
        overflow: hidden;
        font-family: 'Press Start 2P', cursive;
        user-select: none;
        color: #003d38;
    }

    #gameCanvas {
        display: block;
    }

    /* UI Overlays */
    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(5px);
        color: #003d38;
        z-index: 10;
        text-align: center;
    }

    .hidden { display: none !important; }

    h1 {
        color: #00a99c;
        text-shadow: 3px 3px #ffffff;
        font-size: 48px;
        margin-bottom: 20px;
    }
    h2 {
        color: #00a99c;
        text-shadow: 2px 2px #ffffff;
        margin-bottom: 30px;
    }
    p { line-height: 1.5; font-size: 14px; color: #003d38; max-width: 600px; margin: 10px auto; }

    button {
        background: #00a99c;
        color: #ffffff;
        border: none;
        border-bottom: 4px solid #00877d;
        padding: 15px 30px;
        font-family: 'Press Start 2P', cursive;
        font-size: 16px;
        cursor: pointer;
        margin: 10px;
        transition: all 0.2s;
        image-rendering: pixelated;
        border-radius: 8px;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }

    button:hover {
        background: #00c2b2;
        transform: translateY(-2px);
        border-bottom-width: 6px;
    }
    button:active {
        transform: translateY(2px);
        border-bottom-width: 2px;
    }

    /* HUD */
    #hud {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        pointer-events: none;
        padding: 10px;
        box-sizing: border-box;
        z-index: 5;
    }

    .xp-container {
        width: 100%;
        height: 20px;
        background: rgba(255, 255, 255, 0.5);
        border: 2px solid #fff;
        border-radius: 10px;
        position: relative;
        box-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    #xpBar {
        height: 100%;
        background: #00a99c;
        width: 0%;
        transition: width 0.2s;
        border-radius: 8px;
        box-shadow: 0 0 10px #00a99c, 0 0 15px #ffffff;
    }

    #levelText {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #00383a;
        font-size: 12px;
        text-shadow: 1px 1px 0 #fff;
    }

    .top-info {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        color: white;
        font-size: 16px;
        text-shadow: 2px 2px 4px #003d38;
    }

    /* Level Up Menu */
    #levelUpMenu {
        background: rgba(255,255,255,0.8);
        border: 4px solid #fff;
        padding: 20px;
        border-radius: 15px;
        max-width: 800px;
        color: #003d38;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    #upgradeContainer {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 20px;
    }

    .upgrade-card {
        background: #fff;
        border: 3px solid #e6f5f2;
        width: 200px;
        padding: 15px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        border-radius: 10px;
    }

    .upgrade-card:hover {
        transform: scale(1.05);
        border-color: #00a99c;
        box-shadow: 0 0 20px rgba(0, 169, 156, 0.5);
    }

    .upgrade-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 10px;
        background-color: #f0faff;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 2px solid #00a99c;
        border-radius: 50%;
    }

    .upgrade-title { color: #00a99c; font-size: 12px; margin-bottom: 5px; }
    .upgrade-type { color: #8e44ad; font-size: 8px; margin-bottom: 10px; }
    .upgrade-desc { color: #003d38; font-size: 10px; line-height: 1.4; }
    .new-tag { background: #ff85a2; color: white; padding: 2px 5px; font-size: 8px; position: absolute; top: 5px; right: 5px; border-radius: 5px; }

    /* Policy Modal Styles */
    #policyModal {
        background: white;
        padding: 30px 50px;
        border-radius: 15px;
        border: 4px solid #00a99c;
        width: 80%;
        height: 80%;
        max-width: 1200px;
        overflow-y: auto;
        text-align: left;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    #policyListContainer h3 {
        color: #00877d;
        border-bottom: 2px solid #e6f5f2;
        padding-bottom: 10px;
        margin-top: 25px;
        font-size: 18px;
    }

    #policyListContainer ul {
        list-style-type: none;
        padding-left: 0;
    }

    #policyListContainer li {
        font-size: 14px;
        padding: 12px 0;
        color: #003d38;
        border-bottom: 1px dashed #d4ebe7;
    }

    .policy-desc {
        font-size: 10px;
        color: #555;
        margin-top: 8px;
        padding-left: 20px;
        line-height: 1.6;
    }


  /* Joystick Styles */
  #joystick-base {
    position: fixed;
    bottom: 8vh;
    right: 8vw;
    width: min(20vw, 120px);
    height: min(20vw, 120px);
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.3);
    touch-action: none;
    display: none;
    z-index: 20;
  }

  #joystick-thumb {
    position: absolute;
    width: 40%;
    height: 40%;
    top: 30%;
    left: 30%;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    transform: translate(0, 0);
    transition: transform 0.1s ease-out;
  }

/* [수정] 이전에 추가했던 #startScreen 관련 CSS를 모두 지우고 아래 코드로 교체해주세요. */

#startScreen {
    /* .overlay의 justify-content: center 속성을 그대로 사용하게 됩니다. */
    /* 따라서 이전에 추가했던 justify-content: space-between; 은 삭제합니다. */
    padding: 40px 20px;
    box-sizing: border-box;
}

/* 로고를 독립적으로 배치하기 위해 absolute 속성을 사용합니다. */
#startScreen .screen-logo {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%); /* 로고 자체의 너비를 계산해 정확히 중앙에 배치 */
    max-width: 200px;
    width: 50%;
}

/* 제목과 본문이 중앙 정렬되도록 명확하게 지정합니다. */
#startScreen .start-content {
    text-align: center;
}

    /* --- 반응형 폰트 스타일 추가 --- */

/* 반응형 제목 */
#startScreen h1 {
    /* 화면 너비에 따라 글자 크기를 7vw로 조절하되,
       최소 28px, 최대 48px를 넘지 않도록 설정합니다. */
    font-size: clamp(28px, 7vw, 48px);
    white-space: nowrap; /* 제목이 두 줄로 나뉘는 것을 방지 */
}

/* 반응형 설명 (핵심 수정) */
#startScreen p {
    /* 화면 너비에 따라 글자 크기를 3.5vw로 조절하되,
       최소 12px, 최대 14px를 넘지 않도록 설정합니다. */
    font-size: clamp(12px, 3.5vw, 14px);
    line-height: 1.6;
}

    /* --- 반응형 제목 스타일 추가 --- */
    @media screen and (max-width: 768px) {
        h1 {
            /* 화면 너비에 맞춰 글자 크기를 유연하게 조절합니다. */
            font-size: 8vw;
        }
        /* 최소/최대 크기를 지정해 너무 작거나 커지는 것을 방지합니다. */
        #victoryScreen h1, #gameOverScreen h1 {
            font-size: clamp(28px, 8vw, 48px);
        }
    }
</style>
</head>
<body>


<canvas id="gameCanvas"></canvas>
  <div id="joystick-base">
    <div id="joystick-thumb"></div>
  </div>

<div id="hud">
    <div class="xp-container">
        <div id="xpBar"></div>
        <div id="levelText">LV 1</div>
    </div>
    <div class="top-info">
        <div id="timer">00:00</div>
        <div id="killCount">✨ 0</div>
    </div>
</div>

<div id="startScreen" class="overlay">

    <div class="start-content">
      <h1>DREAM SURVIVORS</h1>
      <p>드림과 함께 꿈 속의 악몽들을 헤쳐나가세요!</p>
      <p>이동: PC는 방향키 / 모바일은 조이스틱 / 공격은 자동입니다.</p>
      <button id="btnStart">꿈 속으로</button>
    </div>
  
    <img src="logo.png" alt="DREAM Logo" class="screen-logo">
  
</div>

<div id="pauseMenu" class="overlay hidden">
    <h2>잠깐의 휴식</h2>
    <div id="statsContainer" style="text-align: left; margin-bottom: 20px; font-size: 10px;"></div>
    <button id="btnResume">계속하기</button>
</div>

<div id="gameOverScreen" class="overlay hidden">
  <h1 id="goTitle" style="color:#b30000;">꿈속에 갇혔습니다...</h1>
  <h2 id="goTime">버틴 시간: 00:00</h2>
  <p id="goKills">물리친 악몽: 0</p>
  <p id="goLevel">성장 레벨: 1</p>
  <button id="btnRestart">다시 도전하기</button>
  <button id="btnPolicyGO">정책 확인하기</button>
</div>

<div id="victoryScreen" class="overlay hidden">
  <h1 style="color:#00a99c;">꿈속에서 깨어났습니다!</h1>
  <p>우리의 꿈이 현실이 되었습니다.</p>
  <p id="vKills">물리친 악몽: 0</p>
  <p style="font-size:12px;">“함께 꿈꾸는 캠퍼스, 드림이 만듭니다.”</p>
  <button id="btnRestartVic">다시하기</button>
  <button id="btnPolicyVic">정책 확인하기</button>
</div>

<div id="levelUpScreen" class="overlay hidden">
    <div id="levelUpMenu">
        <h2 style="color:#8e44ad; margin: 0;">성장!</h2>
        <p style="margin-bottom: 0;">새로운 꿈의 조각을 선택하세요</p>
        <div id="upgradeContainer">
            </div>
    </div>
</div>

<div id="policyScreen" class="overlay hidden" style="z-index: 11;">
    <div id="policyModal">
        <h2 style="text-align: center;">드림의 정책</h2>
        <div id="policyListContainer">
            </div>
        <button id="btnClosePolicy" style="display: block; margin: 20px auto 0;">닫기</button>
    </div>
</div>


<script>
/*
=========================================================================
   JS SURVIVORS - ENGINE & GAME LOGIC
=========================================================================
*/

// --- COFIGURATION & CONSTANTS ---
const C = {
    WIDTH: window.innerWidth,
    HEIGHT: window.innerHeight,
    FPS: 60,
    TILE_SIZE: 128,
    COLORS: {
        bg: '#e6f5f2',
        grid: '#fff7e0',
        player: '#00a99c',
        hp: '#00a99c',
        hpBg: '#98d2c6',
        e1: '#ffc1e3',
        e2: '#ffb3ba',
        e3: '#ffffba',
        e4: '#d1b3ff',
        e5: '#008080',
        xp1: '#ffd700',
        xp2: '#ffec8b',
        xp3: '#ffffff',
        dmgWhite: '#ffffff',
        dmgCrit: '#ff85a2'
    }
};

// Global Game State
const GS = {
    canvas: document.getElementById('gameCanvas'),
    ctx: document.getElementById('gameCanvas').getContext('2d', { alpha: false }),
    state: 'start',
    player: null,
    enemies: [],
    projectiles: [],
    enemyProjectiles: [],
    gems: [],
    potions: [], // ✨ 체력 물약 배열 추가
    particles: [],
    particlePool: [],
    damageTexts: [],
    camera: { x: 0, y: 0 },
    input: { up: false, down: false, left: false, right: false },
    audio: null,
    time: 0,
    kills: 0,
    frameCount: 0,
    lastTime: 0,
    dt: 0,
    screenShake: 0,
    spawnTimer: 0,
    bossAlert: { text: '', life: 0 },
    victoryInProgress: false, // ✨ 승리 애니메이션 플래그

    // --- Stage Progression Logic ---
    stageIndex: 0,
    stageTitle: null,
    bossHasSpawned: false,
    level5BossTriggered: false,
    level10BossTriggered: false,
    level15BossTriggered: false,
    level20BossTriggered: false,
    currentEnemyNames: null,
    currentBg: null,
};

// Resize handling
function resize() {
    C.WIDTH = window.innerWidth;
    C.HEIGHT = window.innerHeight;
    GS.canvas.width = C.WIDTH;
    GS.canvas.height = C.HEIGHT;
    GS.ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resize);
resize();

// --- MATH UTILS ---
const M = {
    dist: (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1),
    distSq: (x1, y1, x2, y2) => (x2-x1)**2 + (y2-y1)**2,
    angle: (x1, y1, x2, y2) => Math.atan2(y2 - y1, x2 - x1),
    rand: (min, max) => Math.random() * (max - min) + min,
    randInt: (min, max) => Math.floor(Math.random() * (max - min + 1)) + min,
    clamp: (val, min, max) => Math.min(Math.max(val, min), max),
    lerp: (a, b, t) => a + (b - a) * t,
    collides: (a, b) => M.distSq(a.x, a.y, b.x, b.y) < (a.r + b.r)**2,
    formatTime: (s) => {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }
};

// --- AUDIO SYSTEM ---
class AudioSys {
    constructor() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); this.masterVol = 0.3; }
    playTone(freq, type, duration, vol = 1, slide = 0) { if (GS.state === 'paused') return; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime); if (slide !== 0) { osc.frequency.exponentialRampToValueAtTime(freq + slide, this.ctx.currentTime + duration); } gain.gain.setValueAtTime(vol * this.masterVol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + duration); }
    sfxShoot() { this.playTone(M.rand(600, 800), 'sine', 0.1, 0.2, 200); }
    sfxEnemyShoot() { this.playTone(M.rand(300, 400), 'square', 0.1, 0.1); }
    sfxHit() { this.playTone(M.rand(200, 300), 'triangle', 0.1, 0.3); }
    sfxXp() { this.playTone(M.rand(1000, 1200), 'sine', 0.08, 0.15); }
    sfxLevelUp() { const now = this.ctx.currentTime; [523, 659, 783, 1046].forEach((freq, i) => { const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = 'triangle'; osc.frequency.value = freq; gain.gain.setValueAtTime(0.2, now + i*0.1); gain.gain.linearRampToValueAtTime(0, now + i*0.1 + 0.2); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(now + i*0.1); osc.stop(now + i*0.1 + 0.2); }); }
    sfxHurt() { this.playTone(150, 'sawtooth', 0.3, 0.5, -50); }
    sfxDie() { this.playTone(100, 'sawtooth', 1.5, 0.6, -80); }
}

// --- DRAWING HELPERS ---
const Draw = {
    glow: (color, intensity) => { /* 아무것도 안 함 */ },
    resetGlow: () => { GS.ctx.shadowBlur = 0; },
    circle: (x, y, r, color, stroke = null, lw = 2) => {
        const cx = x - GS.camera.x + C.WIDTH/2;
        const cy = y - GS.camera.y + C.HEIGHT/2;
        if (cx < -r || cx > C.WIDTH + r || cy < -r || cy > C.HEIGHT + r) return;
        GS.ctx.beginPath();
        GS.ctx.arc(cx, cy, r, 0, Math.PI * 2);
        GS.ctx.fillStyle = color;
        GS.ctx.fill();
        if (stroke) {
            GS.ctx.strokeStyle = stroke;
            GS.ctx.lineWidth = lw;
            GS.ctx.stroke();
        }
    },
    rect: (x, y, w, h, color, angle = 0) => { const cx = x - GS.camera.x + C.WIDTH/2; const cy = y - GS.camera.y + C.HEIGHT/2; GS.ctx.save(); GS.ctx.translate(cx, cy); GS.ctx.rotate(angle); GS.ctx.fillStyle = color; GS.ctx.fillRect(-w/2, -h/2, w, h); GS.ctx.restore(); },
    text: (str, x, y, size, color, align = 'center') => { const cx = x - GS.camera.x + C.WIDTH/2; const cy = y - GS.camera.y + C.HEIGHT/2; GS.ctx.font = `${size}px 'Press Start 2P'`; GS.ctx.fillStyle = color; GS.ctx.textAlign = align; Draw.glow(color, 10); GS.ctx.fillText(str, cx, cy); Draw.resetGlow(); },
    background: () => { const grad = GS.ctx.createLinearGradient(0, 0, C.WIDTH, C.HEIGHT); grad.addColorStop(0, '#e6f5f2'); grad.addColorStop(1, '#d4ebe7'); GS.ctx.fillStyle = grad; GS.ctx.fillRect(0, 0, C.WIDTH, C.HEIGHT); }
};

// --- BASE CLASSES ---
class Entity { constructor(x, y, r) { this.x = x; this.y = y; this.r = r; this.active = true; } }

// --- VISUAL EFFECTS ---
class Particle extends Entity {
    constructor(x, y, color, size, speed, life) {
        super(x, y, 0);
        this.reset(x, y, color, size, speed, life);
    }
    reset(x, y, color, size, speed, life) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = size;
        this.life = life;
        this.maxLife = life;
        const a = M.rand(0, Math.PI * 2);
        this.vx = Math.cos(a) * speed;
        this.vy = Math.sin(a) * speed;
        this.active = true;
        return this;
    }
    update() {
        this.x += this.vx * GS.dt;
        this.y += this.vy * GS.dt;
        this.life -= GS.dt;
        if (this.life <= 0) {
            this.active = false;
            GS.particlePool.push(this);
        }
    }
    draw() {
        const alpha = this.life / this.maxLife;
        GS.ctx.globalAlpha = alpha;
        Draw.circle(this.x, this.y, this.size, this.color);
        GS.ctx.globalAlpha = 1;
    }
}
class DamageText extends Entity { constructor(x, y, dmg, isCrit) { super(x + M.rand(-10, 10), y - 20, 0); this.text = Math.round(dmg); this.color = isCrit ? C.COLORS.dmgCrit : C.COLORS.dmgWhite; this.size = isCrit ? 20 : 12; this.life = 1; this.vy = -50; } update() { this.y += this.vy * GS.dt; this.life -= GS.dt; if (this.life <= 0) this.active = false; } draw() { GS.ctx.globalAlpha = Math.min(1, this.life * 2); Draw.text(this.text, this.x, this.y, this.size, this.color); GS.ctx.globalAlpha = 1; } }
function spawnParticles(x, y, color, count, hw = false) {
    for (let i = 0; i < count; i++) {
        if (GS.particlePool.length > 0) {
            let s = hw ? M.rand(50, 150) : M.rand(100, 300);
            let sz = hw ? M.rand(2, 5) : M.rand(1, 3);
            const p = GS.particlePool.pop().reset(x, y, color, sz, s, M.rand(0.2, 0.5));
            GS.particles.push(p);
        }
    }
}

// --- COLLECTIBLES ---
class ExperienceOrb extends Entity {
    constructor(x, y, value) { super(x, y, 6); this.value = value; if (value < 5) { this.color = C.COLORS.xp1; this.r = 5; } else if (value < 20) { this.color = C.COLORS.xp2; this.r = 7; } else { this.color = C.COLORS.xp3; this.r = 9; } this.vx = 0; this.vy = 0; this.magnetized = false; }
    update() { const distToPlayerSq = M.distSq(this.x, this.y, GS.player.x, GS.player.y); if (this.magnetized || distToPlayerSq < GS.player.stats.magnet**2) { this.magnetized = true; const angle = M.angle(this.x, this.y, GS.player.x, GS.player.y); const speed = 600; this.vx = M.lerp(this.vx, Math.cos(angle) * speed, 5 * GS.dt); this.vy = M.lerp(this.vy, Math.sin(angle) * speed, 5 * GS.dt); this.x += this.vx * GS.dt; this.y += this.vy * GS.dt; if (distToPlayerSq < (GS.player.r + this.r)**2) { GS.player.gainXp(this.value); this.active = false; if (GS.audio) GS.audio.sfxXp(); } } else { this.y += Math.sin(GS.time * 5 + this.x) * 10 * GS.dt; } }
    draw() {
        const cx = this.x - GS.camera.x + C.WIDTH/2;
        const cy = this.y - GS.camera.y + C.HEIGHT/2;
        if (cx < -this.r || cx > C.WIDTH + this.r || cy < -this.r || cy > C.HEIGHT + this.r) return;
        GS.ctx.save();
        GS.ctx.translate(cx, cy);
        GS.ctx.rotate(GS.time);
        GS.ctx.beginPath();

class HealthPotion extends Entity {

class Beam extends Weapon { constructor() { super("비전의 빛", "#ff66ff"); this.baseDmg = 8; this.baseCd = 4.0; this.baseDur = 1.5; this.kb = 10; this.firing = false; this.fireTimer = 0; this.targetAngle = 0; } update() { super.update(); if (this.firing) { this.fireTimer -= GS.dt; if (this.fireTimer % 0.2 < GS.dt) { const s = this.stats; const isCrit = Math.random() < GS.player.stats.critChance; const dmg = s.dmg * GS.player.stats.might * (isCrit ? GS.player.stats.critDmg : 1); const ex = GS.player.x + Math.cos(this.targetAngle) * C.WIDTH; const ey = GS.player.y + Math.sin(this.targetAngle) * C.WIDTH; for (const e of GS.enemies) { const num = Math.abs((ey - GS.player.y)*e.x - (ex - GS.player.x)*e.y + ex*GS.player.y - ey*GS.player.y); const den = Math.sqrt((ey - GS.player.y)**2 + (ex - GS.player.x)**2); const dist = num / den; const dot = (e.x - GS.player.x)*(ex - GS.player.x) + (e.y - GS.player.y)*(ey - GS.player.y); if (dist < e.r + (15 * s.area) && dot > 0) { e.takeDamage(dmg, isCrit, s.kb, this.targetAngle); /* spawnParticles(e.x, e.y, '#ff66ff', 1, true); */ } } if (GS.audio) GS.audio.playTone(100, 'sawtooth', 0.1, 0.05); } if (this.fireTimer <= 0) this.firing = false; } } attack() { const t = this.getNearestEnemy(); if (!t) { this.targetAngle = M.rand(0, Math.PI*2); } else { this.targetAngle = M.angle(GS.player.x, GS.player.y, t.x, t.y); } this.firing = true; this.fireTimer = this.stats.dur; if (GS.audio) GS.audio.playTone(800, 'sawtooth', 0.5, 0.1, -400); } draw() { if (this.firing) { const ctx = GS.ctx; const w = C.WIDTH * 1.5; const h = 30 * this.stats.area * (0.5 + Math.random()*0.5); ctx.save(); ctx.translate(C.WIDTH/2, C.HEIGHT/2); ctx.rotate(this.targetAngle); Draw.glow('#ff66ff', 30); ctx.fillStyle = 'rgba(255, 100, 255, 0.5)'; ctx.fillRect(0, -h/2, w, h); ctx.fillStyle = '#ffffff'; ctx.fillRect(0, -h/4, w, h/2); Draw.resetGlow(); ctx.restore(); } } getDescription() { return "가장 가까운 적 방향으로 모든 것을 관통하는 강력한 빔을 발사합니다."; } }

// --- ACTORS ---
class Player extends Entity {
    constructor() {
        super(0, 0, 15);
        // ✨ 플레이어 기본 방어력(armor) 3으로 설정
        this.baseStats = { maxHp: 100, moveSpeed: 200, magnet: 100, might: 1, area: 1, speedProj: 1, duration: 1, amount: 0, cooldown: 1, luck: 1, critChance: 0.05, critDmg: 2.0, armor: 3, regen: 0 };
        this.stats = { ...this.baseStats };
        this.hp = this.stats.maxHp;
        this.xp = 0;
        this.level = 1;
        this.nextLevelXp = 5;
        this.weapons = [];
        this.passives = {};
        this.invulnTimer = 0;
        this.regenTimer = 0;
        this.facing = 1;
        this.addWeapon(new Wand());
    }
    update() {
        if (GS.victoryInProgress) return; // ✨ 승리 애니메이션 중 움직임 정지
        let dx = 0, dy = 0; if (GS.input.up) dy -= 1; if (GS.input.down) dy += 1; if (GS.input.left) dx -= 1; if (GS.input.right) dx += 1; if (dx !== 0 && dy !== 0) { const invSqrt2 = 0.7071; dx *= invSqrt2; dy *= invSqrt2; } this.x += dx * this.stats.moveSpeed * GS.dt; this.y += dy * this.stats.moveSpeed * GS.dt; if (dx !== 0) this.facing = Math.sign(dx); GS.camera.x = M.lerp(GS.camera.x, this.x, 10 * GS.dt); GS.camera.y = M.lerp(GS.camera.y, this.y, 10 * GS.dt); this.weapons.forEach(w => w.update()); if (this.hp < this.stats.maxHp && this.stats.regen > 0) { this.regenTimer += GS.dt; if (this.regenTimer >= 1) { this.hp = Math.min(this.stats.maxHp, this.hp + this.stats.regen); this.regenTimer = 0; GS.damageTexts.push(new DamageText(this.x, this.y, this.stats.regen, false)); GS.damageTexts[GS.damageTexts.length-1].color = '#00a99c'; } } if (this.invulnTimer > 0) this.invulnTimer -= GS.dt; if (Math.abs(this.x) > 50000) this.x = 0; if (Math.abs(this.y) > 50000) this.y = 0; }
    draw() { this.weapons.forEach(w => { if(w.draw) w.draw(); }); if (this.invulnTimer > 0 && Math.floor(GS.time * 20) % 2 === 0) return; const cx = C.WIDTH/2; const cy = C.HEIGHT/2; GS.ctx.save(); GS.ctx.translate(cx, cy); const ringAngle = GS.time * 2; GS.ctx.rotate(ringAngle); GS.ctx.strokeStyle = 'rgba(0, 169, 156, 0.7)'; GS.ctx.lineWidth = 2; Draw.glow('rgba(0, 169, 156, 0.7)', 10); GS.ctx.beginPath(); GS.ctx.arc(0, 0, this.r * 1.5, 0, Math.PI * 1.5); GS.ctx.stroke(); Draw.resetGlow(); GS.ctx.restore(); Draw.glow(C.COLORS.player, 20); Draw.circle(this.x, this.y, this.r, C.COLORS.player, '#fff', 2); Draw.resetGlow(); const bw = 40, bh = 6; GS.ctx.fillStyle = C.COLORS.hpBg; GS.ctx.fillRect(cx - bw/2, cy + this.r + 5, bw, bh); GS.ctx.fillStyle = C.COLORS.hp; GS.ctx.fillRect(cx - bw/2, cy + this.r + 5, bw * (this.hp / this.stats.maxHp), bh); }
    takeDamage(amount) { if (this.invulnTimer > 0 || GS.state !== 'running') return; const actualDmg = Math.max(1, amount - this.stats.armor); this.hp -= actualDmg; this.invulnTimer = 0.5; GS.screenShake = 5; GS.damageTexts.push(new DamageText(this.x, this.y, actualDmg, false)); GS.damageTexts[GS.damageTexts.length-1].color = '#ff85a2'; if (GS.audio) GS.audio.sfxHurt(); if (this.hp <= 0) { gameOver(); } }

    gainXp(amount) {
        this.xp += amount;
        if (this.xp >= this.nextLevelXp) {
            this.xp -= this.nextLevelXp;
            this.levelUp();
        }
        updateHud();
    }

    levelUp() {
        this.level++;
        this.nextLevelXp = Math.floor(8 + this.level * 4 * (1 + this.level*0.03));

        if (GS.audio) GS.audio.sfxLevelUp();
        GS.state = 'levelup';
        generateUpgrades();
    }
    addWeapon(weaponInstance) { this.weapons.push(weaponInstance); weaponInstance.level = 1; }
}

class Enemy extends Entity {
    constructor(typeConfig, x, y) {

        let ax = 0, ay = 0;
        /*
        for (const other of GS.enemies) { if (other === this) continue; const dSq = M.distSq(this.x, this.y, other.x, other.y); if (dSq > 0 && dSq < (this.r + other.r + 10)**2) { const a = M.angle(other.x, other.y, this.x, this.y); const force = 1 - (dSq / ((this.r + other.r + 10)**2)); ax += Math.cos(a) * 200 * force; ay += Math.sin(a) * 200 * force; } }
        */
        this.vx = M.lerp(this.vx, Math.cos(angle) * this.speed + ax, 5 * GS.dt);
        this.vy = M.lerp(this.vy, Math.sin(angle) * this.speed + ay, 5 * GS.dt);
        this.x += this.vx * GS.dt;
        this.y += this.vy * GS.dt;
        if (M.collides(this, GS.player)) { GS.player.takeDamage(this.damage); }
        if (this.flash > 0) this.flash -= GS.dt;
        if (this.auraTimer > 0) this.auraTimer -= GS.dt;
        if (M.distSq(this.x, this.y, GS.player.x, GS.player.y) > (C.WIDTH * 2)**2) { this.active = false; }
        if (this.shoots) { this.shootTimer -= GS.dt; if (this.shootTimer <= 0) { this.shoot(); this.shootTimer = this.shootCd; } }
    }
    shoot() { if (GS.audio) GS.audio.sfxEnemyShoot(); const angle = M.angle(this.x, this.y, GS.player.x, GS.player.y); const speed = 200; const vx = Math.cos(angle) * speed; const vy = Math.sin(angle) * speed; GS.enemyProjectiles.push(new EnemyProjectile(this.x, this.y, 6, vx, vy, this.damage * 0.7, 3, this.color)); }
    draw() {
        const col = this.flash > 0 ? '#fff' : this.color;
        const bob = Math.sin(GS.time * 5 + this.bobOffset) * 2;
        Draw.circle(this.x, this.y + bob, this.r, col);
        Draw.circle(this.x - this.r / 2, this.y + this.r / 3 + bob, this.r * 0.6, col);
        Draw.circle(this.x + this.r / 2, this.y + this.r / 3 + bob, this.r * 0.6, col);
        const cx = this.x - GS.camera.x + C.WIDTH / 2;
        const cy = this.y - GS.camera.y + C.HEIGHT / 2 + bob;
        if (cx > -this.r && cx < C.WIDTH + this.r && cy > -this.r && cy < C.HEIGHT + this.r) {
            GS.ctx.strokeStyle = 'rgba(0,0,0,0.5)';
            GS.ctx.lineWidth = 2;
            const eyeX = this.r * 0.4;
            const eyeY = this.r * 0.1;
            const eyeW = this.r * 0.25;
            GS.ctx.beginPath();
            GS.ctx.moveTo(cx - eyeX, cy - eyeY);
            GS.ctx.lineTo(cx - eyeX + eyeW, cy + eyeY);
            GS.ctx.stroke();
            GS.ctx.beginPath();
            GS.ctx.moveTo(cx + eyeX, cy - eyeY);
            GS.ctx.lineTo(cx + eyeX - eyeW, cy + eyeY);
            GS.ctx.stroke();
        }
        if (this.name) {
            const nameFont = "16px Arial";
            const nameY = this.y + bob - this.r - 12;
            const nameX = this.x;
            const nameCx = nameX - GS.camera.x + C.WIDTH/2;
            const nameCy = nameY - GS.camera.y + C.HEIGHT/2;
            GS.ctx.font = nameFont;
            GS.ctx.textAlign = "center";
            GS.ctx.strokeStyle = "black";
            GS.ctx.lineWidth = 3;
            GS.ctx.strokeText(this.name, nameCx, nameCy);
            GS.ctx.fillStyle = "white";
            GS.ctx.fillText(this.name, nameCx, nameCy);
        }
    }
    takeDamage(amount, isCrit, kb, angle) { this.hp -= amount; this.flash = 0.1; GS.damageTexts.push(new DamageText(this.x, this.y, amount, isCrit)); /* spawnParticles(this.x, this.y, this.color, 1, true); */ const kbf = Math.max(0, kb - this.kbResist); this.x += Math.cos(angle) * kbf * GS.dt * 2; this.y += Math.sin(angle) * kbf * GS.dt * 2; this.vx = 0; this.vy = 0; if (this.hp <= 0) this.die(); }
    die() {
        this.active = false;
        GS.kills++;
        GS.gems.push(new ExperienceOrb(this.x, this.y, this.xp));

        // ✨ 5% 확률로 체력 물약 드랍
        if (Math.random() < 0.05) {
            GS.potions.push(new HealthPotion(this.x, this.y));
        }

        updateHud();
    }
}

class StandardBoss extends Enemy {
    constructor(typeConfig, x, y) {
        super(typeConfig, x, y);
        this.shootTimer = M.rand(2, 4);
        this.shootCd = 4;
        this.projectileSpeed = 220 * (1 + (GS.stageIndex ? GS.stageIndex * 0.2 : 0));
    }
    update() {
        super.update();
        if (GS.victoryInProgress) return; // ✨ 승리 애니메이션 중에는 공격 패턴 정지
        this.shootTimer -= GS.dt;
        if (this.shootTimer <= 0) {
            this.shoot();
            this.shootTimer = this.shootCd + M.rand(-0.5, 0.5);
        }
    }
    shoot() {
        if (GS.audio) GS.audio.playTone(300, 'sawtooth', 0.3, 0.2);
        function spawnProjectile(x, y, angle, speed) {
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            const p = new EnemyProjectile(x, y, 7, vx, vy, this.damage, 4, this.color);
            GS.enemyProjectiles.push(p);
            return p;
        }
        const dx = GS.player.x - this.x;
        const dy = GS.player.y - this.y;
        const angle = Math.atan2(dy, dx);

        if (GS.stageIndex === 0) { // 1단계 보스: 3발 부채꼴 공격
            for (let i = -1; i <= 1; i++) {
                spawnProjectile.call(this, this.x, this.y, angle + i * 0.25, this.projectileSpeed);
            }
        } else if (GS.stageIndex === 1) { // 2단계 보스: 7발 부채꼴 공격
            for (let i = -3; i <= 3; i++) {
                spawnProjectile.call(this, this.x, this.y, angle + i * 0.2, this.projectileSpeed);
            }
        } else if (GS.stageIndex === 2) { // 3단계 보스: 압박형 원형 탄막
            const numProjectiles = 12;
            for (let i = 0; i < numProjectiles; i++) {
                const a = (i * (Math.PI * 2 / numProjectiles)) + (angle * 0.2); // 플레이어 방향으로 살짝 유도
                spawnProjectile.call(this, this.x, this.y, a, this.projectileSpeed * 0.9);
            }
        }
    }
    die() {
        this.active = false; GS.kills++; /* spawnParticles(this.x, this.y, this.color, 100); */
        const xpNeeded = Math.max(1, GS.player.nextLevelXp * 0.8);
        GS.gems.push(new ExperienceOrb(this.x, this.y, xpNeeded));
        nextStage();
        updateHud();
    }
}

class FinalBoss extends StandardBoss {
    constructor(typeConfig, x, y) {
        super(typeConfig, x, y);
        this.teleportTimer = 5;
        this.shootTimer = 2.5; // 공격 주기를 살짝 늦춤
        this.summonTimer = 8;
        this.projectileSpeed = 250 * (1 + (GS.stageIndex ? GS.stageIndex * 0.2 : 0));
    }
    update() {
        super.update(); // StandardBoss의 update (shoot 타이머 포함) 호출
        if (GS.victoryInProgress) return; // ✨ 승리 애니메이션 중에는 패턴 정지
        this.teleportTimer -= GS.dt;
        if (this.teleportTimer <= 0) {
            this.teleport();
            this.teleportTimer = M.rand(4, 6);
        }
        this.summonTimer -= GS.dt;
        if (this.summonTimer <= 0) {
            this.summonMinions();
            this.summonTimer = M.rand(7, 10);
        }
    }
    teleport() {
        /* spawnParticles(this.x, this.y, this.color, 50); */
        if (GS.audio) GS.audio.playTone(200, 'sine', 0.5, 0.4, 400);
        const angle = M.rand(0, Math.PI * 2);
        const dist = M.rand(200, C.WIDTH / 2.5);
        this.x = GS.player.x + Math.cos(angle) * dist;
        this.y = GS.player.y + Math.sin(angle) * dist;
        /* spawnParticles(this.x, this.y, this.color, 50); */
    }
    shoot() {
        if (GS.audio) GS.audio.playTone(440, 'triangle', 0.2, 0.3, -100);
        function spawnProjectile(x, y, angle, speed) {
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            const p = new EnemyProjectile(x, y, 8, vx, vy, this.damage * 0.8, 4, '#9400D3');
            GS.enemyProjectiles.push(p);
            return p;
        }
        const dx = GS.player.x - this.x;
        const dy = GS.player.y - this.y;
        const angle = Math.atan2(dy, dx);

        // 1단계: 플레이어를 향한 정밀 5점사
        const numShots = 5;
        const spread = 0.4;
        for (let i = 0; i < numShots; i++) {
            const a = angle + M.lerp(-spread, spread, i / (numShots - 1));
            spawnProjectile.call(this, this.x, this.y, a, this.projectileSpeed * 1.2);
        }

        // 2단계: 0.5초 후 회전 탄막 발사
        setTimeout(() => {
            if (!this.active) return; // 보스가 죽었으면 발사 안함
            const waveShots = 8;
            for (let i = 0; i < waveShots; i++) {
                const a = (GS.time * 3) + (i * (Math.PI * 2 / waveShots));
                spawnProjectile.call(this, this.x, this.y, a, this.projectileSpeed * 0.8);
            }
        }, 500);
    }
    summonMinions() {
        if (GS.audio) GS.audio.playTone(150, 'sawtooth', 0.8, 0.3);
        const count = 3;
        for (let i = 0; i < count; i++) {
            const angle = M.rand(0, Math.PI * 2);
            const dist = this.r + 20;
            const sx = this.x + Math.cos(angle) * dist;
            const sy = this.y + Math.sin(angle) * dist;
            GS.enemies.push(new Enemy(E_DEFS[M.randInt(0, 1)], sx, sy));
        }
    }
    die() {
        this.active = false;
        GS.kills++;
        const xpNeeded = Math.max(1, GS.player.nextLevelXp * 1.0);
        GS.gems.push(new ExperienceOrb(this.x, this.y, xpNeeded));
        updateHud();
        initiateVictorySequence(this.x, this.y); // ✨ 즉시 승리 대신 애니메이션 시작
    }
}

// --- SYSTEMS, MAIN LOOP, UI ---
// ✨ 최종 보스 사망 시 호출될 애니메이션 함수
function initiateVictorySequence(x, y) {
    GS.victoryInProgress = true;
    GS.enemies = []; // 다른 모든 적 제거

    let effectDuration = 2500; // 2.5초간 지속
    let intervalTime = 100;    // 0.1초마다 효과 발생
    let elapsed = 0;

    const victoryInterval = setInterval(() => {
        // 시간이 지남에 따라 화면 흔들림 감소
        GS.screenShake = 20 * (1 - (elapsed / effectDuration));
        
        // 보스 위치에 다채로운 파티클 폭발 생성
        spawnParticles(x, y, C.COLORS.xp1, 30);
        spawnParticles(x, y, C.COLORS.xp3, 15);
        if (GS.audio) GS.audio.sfxHit();

        elapsed += intervalTime;
    }, intervalTime);

    // 2.5초 후 애니메이션을 종료하고 승리 화면 표시
    setTimeout(() => {
        clearInterval(victoryInterval);
        GS.screenShake = 0;
        GS.victoryInProgress = false;
        victory(); // 원래의 승리 함수 호출
    }, effectDuration);
}


function spawnBoss(bossDef, isFinal = false) {
    if (GS.audio) GS.audio.playTone(80, 'sawtooth', 1.0, 0.4);
    GS.bossAlert = { text: '!!! BOSS ALERT !!!', life: 3 };
    const angle = M.rand(0, Math.PI * 2); const dist = C.WIDTH/2 + 100;
    const x = GS.player.x + Math.cos(angle) * dist; const y = GS.player.y + Math.sin(angle) * dist;
    let boss;
    if (isFinal) {
        boss = new FinalBoss(bossDef, x, y);
    } else {
        boss = new StandardBoss(bossDef, x, y);
    }
    const stageMultiplier = 1 + GS.stageIndex * 0.4;
    boss.damage *= stageMultiplier;
    if (isFinal) {
        boss.damage *= 0.5;
    }
    if (boss.attackCooldown !== undefined) {
      boss.attackCooldown = Math.max(0.3, boss.attackCooldown - GS.stageIndex * 0.2);
    }
    if (boss.projectileSpeed !== undefined) {
      boss.projectileSpeed *= 1 + GS.stageIndex * 0.2;
    }
    boss.speed *= Math.min(1.3, 1 + GS.stageIndex * 0.05);
    GS.enemies.push(boss);
}

function checkCollisions() { for (const p of GS.projectiles) { for (const e of GS.enemies) { if (p.hitList.includes(e)) continue; if (M.collides(p, e)) { p.onHit(e); p.hitList.push(e); if (!p.active) break; } } } }

function generateUpgrades() { const container = document.getElementById('upgradeContainer'); container.innerHTML = ''; document.getElementById('levelUpScreen').classList.remove('hidden'); let options = []; GS.player.weapons.forEach(w => { if (w.level < w.maxLevel) { options.push({ type: 'weapon_up', obj: w }); } }); if (GS.player.weapons.length < 6) { WEAPON_POOL.forEach(WClass => { if (!GS.player.weapons.some(w => w instanceof WClass)) { options.push({ type: 'weapon_new', cls: WClass }); } }); } PASSIVE_POOL.forEach(p => { const lvl = GS.player.passives[p.id] || 0; if (lvl < 5) { options.push({ type: 'passive', def: p, lvl: lvl }); } }); if (options.length === 0) { options.push({ type: 'heal' }); } options.sort(() => Math.random() - 0.5); const choices = options.slice(0, Math.min(3 + (GS.player.stats.luck > 1.2 ? 1:0), options.length)); choices.forEach(choice => { const card = document.createElement('div'); card.className = 'upgrade-card'; let title, desc, typeStr, iconCol; let isNew = false; if (choice.type === 'weapon_up') { title = choice.obj.name + ' (Lv ' + (choice.obj.level+1) + ')'; desc = choice.obj.getDescription(); typeStr = "WEAPON UPGRADE"; iconCol = choice.obj.iconColor; } else if (choice.type === 'weapon_new') { const temp = new choice.cls(); const currentStageSkills = STAGE_SKILL_SETS[GS.stageIndex + 1]; const skillInfo = currentStageSkills.find(s => s.base === choice.cls); title = skillInfo ? skillInfo.name : temp.name; desc = temp.getDescription(); typeStr = "NEW WEAPON"; iconCol = temp.iconColor; isNew = true; } else if (choice.type === 'passive') { title = choice.def.name + ' (Lv ' + (choice.lvl+1) + ')'; desc = choice.def.desc; typeStr = "PASSIVE"; iconCol = choice.def.icon; if (choice.lvl === 0) isNew = true; } else { title = "달콤한 휴식"; desc = "체력 30% 회복"; typeStr = "CONSUMABLE"; iconCol = "#f88"; } card.innerHTML = `<div class="upgrade-icon" style="background:${iconCol}"></div> <div class="upgrade-title">${title}</div> <div class="upgrade-type">${typeStr}</div> <div class="upgrade-desc">${desc}</div> ${isNew ? '<div class="new-tag">NEW!</div>' : ''}`; card.onclick = () => selectUpgrade(choice); container.appendChild(card); }); }
function selectUpgrade(choice) { if (GS.audio) GS.audio.playTone(880, 'sine', 0.1, 0.5); if (choice.type === 'weapon_up') { choice.obj.level++; } else if (choice.type === 'weapon_new') { const newWeapon = new choice.cls(); const currentStageSkills = STAGE_SKILL_SETS[GS.stageIndex + 1]; const skillInfo = currentStageSkills.find(s => s.base === choice.cls); if (skillInfo) { newWeapon.name = skillInfo.name; } GS.player.addWeapon(newWeapon); } else if (choice.type === 'passive') { choice.def.apply(GS.player.stats); GS.player.passives[choice.def.id] = (GS.player.passives[choice.def.id] || 0) + 1; } else if (choice.type === 'heal') { GS.player.hp = Math.min(GS.player.stats.maxHp, GS.player.hp + GS.player.stats.maxHp * 0.3); } document.getElementById('levelUpScreen').classList.add('hidden'); GS.state = 'running'; GS.lastTime = performance.now(); }

function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);
    const rawDt = (timestamp - GS.lastTime) / 1000;
    GS.lastTime = timestamp;
    GS.dt = Math.min(rawDt, 0.1);

    GS.dt *= 0.85; // 게임 전체 속도를 15% 느리게 조절합니다.

    if (GS.state !== 'running') {
        if (GS.state !== 'paused' && GS.state !== 'levelup') { render(); }
        return;
    }
    GS.time += GS.dt; // GS.time은 'running' 상태일 때만 증가합니다.
    GS.frameCount++;
    update();
    render();
    updateHud();
}

function update() {
    // if (!GS.startTime) GS.startTime = Date.now(); // 실제 시간(Real time) 체크를 위한 라인 제거
    // const elapsed = (Date.now() - GS.startTime) / 1000; // 실제 시간(Real time) 체크를 위한 라인 제거
    if (GS.time >= 180 && !GS.gameOver) { // 순수 게임 플레이 시간(GS.time) 3분(180초)으로 체크
        GS.gameOver = true;
        endGame("시간 초과! 3분 내 클리어 실패");
        return;
    }
    spawnEnemies();
    GS.player.update();
    const updateEntity = (e) => { e.update(); return e.active; };
    GS.enemies = GS.enemies.filter(updateEntity);
    GS.projectiles = GS.projectiles.filter(updateEntity);
    GS.enemyProjectiles = GS.enemyProjectiles.filter(updateEntity);
    GS.gems = GS.gems.filter(updateEntity);
    GS.potions = GS.potions.filter(updateEntity); // ✨ 물약 업데이트 추가
    GS.particles = GS.particles.filter(p => p.active);
    GS.damageTexts = GS.damageTexts.filter(updateEntity);
    checkCollisions();
    if (GS.screenShake > 0) GS.screenShake -= GS.dt * 20;
    if (GS.bossAlert.life > 0) GS.bossAlert.life -= GS.dt;
}
function render() {
    GS.ctx.save();
    if (GS.screenShake > 0) {
        GS.ctx.translate(M.rand(-GS.screenShake, GS.screenShake), M.rand(-GS.screenShake, GS.screenShake));
    }
    Draw.background();
    GS.gems.forEach(e => e.draw());
    GS.potions.forEach(p => p.draw()); // ✨ 물약 그리기 추가
    GS.particles.forEach(e => e.draw());
    GS.enemies.sort((a, b) => a.y - b.y);
    GS.enemies.forEach(e => e.draw());
    GS.player.draw();
    GS.projectiles.forEach(e => e.draw());
    GS.enemyProjectiles.forEach(e => e.draw());
    GS.damageTexts.forEach(e => e.draw());
    const grad = GS.ctx.createRadialGradient(C.WIDTH / 2, C.HEIGHT / 2, C.HEIGHT / 2, C.WIDTH / 2, C.HEIGHT / 2, C.WIDTH / 1.5);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(1, 'rgba(0,0,0,0.1)');
    GS.ctx.fillStyle = grad;
    GS.ctx.fillRect(0, 0, C.WIDTH, C.HEIGHT);
    if (GS.bossAlert.life > 0) {
        const alpha = Math.min(1, GS.bossAlert.life);
        const size = 40 + (3 - GS.bossAlert.life) * 5;
        GS.ctx.globalAlpha = alpha;
        Draw.text(GS.bossAlert.text, GS.player.x, GS.player.y - C.HEIGHT / 3, size, '#b30000');
        GS.ctx.globalAlpha = 1;
    }

    GS.ctx.font = "16px 'Press Start 2P'";
    GS.ctx.textAlign = "center";
    GS.ctx.fillStyle = "#003d38";
    GS.ctx.strokeStyle = "white";
    GS.ctx.lineWidth = 4;
    const stageName = STAGES[GS.stageIndex]?.name || "";
    const stageText = `STAGE ${GS.stageIndex + 1} - ${stageName}`;
    const xPos = C.WIDTH / 2;
    const yPos = 85;
    GS.ctx.strokeText(stageText, xPos, yPos);
    GS.ctx.fillText(stageText, xPos, yPos);

    drawStageTitle();
    GS.ctx.restore();
}
function updateHud() { const p = GS.player; const xpPct = (p.xp / p.nextLevelXp) * 100; document.getElementById('xpBar').style.width = `${xpPct}%`; document.getElementById('levelText').innerText = `LV ${p.level}`; document.getElementById('timer').innerText = M.formatTime(GS.time); document.getElementById('killCount').innerText = `✨ ${GS.kills}`; }

function initGame() {
    GS.player = new Player(); GS.enemies = []; GS.projectiles = []; GS.enemyProjectiles = []; GS.gems = []; GS.particles = []; GS.damageTexts = []; GS.potions = []; // ✨ 물약 초기화 추가
    
    GS.particlePool = [];
    for (let i = 0; i < 300; i++) {
        GS.particlePool.push(new Particle(0,0,'#fff',0,0,0));
    }

    GS.time = 0; GS.kills = 0; GS.camera = { x: 0, y: 0 }; GS.spawnTimer = 1.8; GS.bossAlert = { text: '', life: 0 };
    GS.startTime = null;
    GS.gameOver = false;
    GS.victoryInProgress = false; // ✨ 승리 애니메이션 플래그 초기화
    GS.stageIndex = 0;
    const initialStage = STAGES[GS.stageIndex];
    GS.stageTitle = { text: `STAGE 1 - ${initialStage.name}`, timer: 2.5 };
    GS.bossHasSpawned = false;
    GS.level5BossTriggered = false;
    GS.level10BossTriggered = false;
    GS.level15BossTriggered = false;
    GS.level20BossTriggered = false;
    GS.currentEnemyNames = STAGE_ENEMY_NAMES[GS.stageIndex + 1];

    updatePassiveNames(1);
    const skillSet = STAGE_SKILL_SETS[1];

function updatePassiveNames(stageNum) {
    const newNames = STAGE_PASSIVE_NAMES[stageNum];
    if (!newNames) return;
    PASSIVE_POOL.forEach(passive => {
        if (newNames[passive.id]) { passive.name = newNames[passive.id]; }

function nextStage() {
  if (GS._stageTransitioning) return;
  GS._stageTransitioning = true;
  if (GS.stageIndex >= STAGES.length - 1) return;
  GS.stageIndex++;
  const stage = STAGES[GS.stageIndex];
  GS.bossHasSpawned = false;
  GS.stageTitle = { text: `STAGE ${GS.stageIndex + 1} - ${stage.name}`, timer: 2.5 };
  updatePassiveNames(GS.stageIndex + 1);
  const newSet = STAGE_SKILL_SETS[GS.stageIndex + 1];
  if (newSet) {
    GS.player.weapons.forEach(w => {
      const skillInfo = newSet.find(s => w instanceof s.base);
      if (skillInfo) { w.name = skillInfo.name; }
    });
  }
  const names = STAGE_ENEMY_NAMES[GS.stageIndex + 1];
  if (names) GS.currentEnemyNames = names;
  const bg = STAGE_BACKGROUNDS[GS.stageIndex + 1];
  if (bg) GS.currentBg = bg;
  setTimeout(() => { GS._stageTransitioning = false; }, 2000);
}

function spawnEnemies() {
    if (GS.victoryInProgress) return; // ✨ 승리 애니메이션 중에는 적 스폰 중지
    if (
        GS.player.level >= (GS.stageIndex + 1) * 5 &&
        !GS.bossHasSpawned
    ) {
        GS.bossHasSpawned = true;
        let bossDef = STAGE_BOSS_DEFS[GS.stageIndex];
        let isFinal = GS.stageIndex === STAGE_BOSS_DEFS.length - 1;
        spawnBoss(bossDef, isFinal);
        return;
    }
    if (GS.bossHasSpawned) return;

    GS.spawnTimer -= GS.dt;
    if (GS.spawnTimer <= 0) {
        const spawnInterval = Math.max(0.05, 0.4 - (GS.player.level * 0.025) - (GS.stageIndex * 0.1));
        GS.spawnTimer = spawnInterval;

        const currentStage = STAGES[GS.stageIndex];
        const enemyList = currentStage.enemyTypes;
        const typeIdx = enemyList[M.randInt(0, enemyList.length - 1)];
        const angle = M.rand(0, Math.PI * 2);
        const dist = Math.sqrt((C.WIDTH / 2) ** 2 + (C.HEIGHT / 2) ** 2) + 50;
        const x = GS.player.x + Math.cos(angle) * dist;
        const y = GS.player.y + Math.sin(angle) * dist;
        const eDef = E_DEFS[typeIdx];
        if (eDef.shoots && Math.random() > 0.15) return;
        const e = new Enemy(eDef, x, y);
        if (GS.currentEnemyNames) { e.name = GS.currentEnemyNames[M.randInt(0, GS.currentEnemyNames.length - 1)]; }
        GS.enemies.push(e);
    }
}

    GS.stageTitle.timer -= GS.dt;
  }
}

function setupJoystick() {
  const base = document.getElementById('joystick-base');
  const thumb = document.getElementById('joystick-thumb');

  if (/Mobi|Android/i.test(navigator.userAgent)) {
    base.style.display = 'block';
  }

  let active = false;
  let baseRect = base.getBoundingClientRect();

  const updateRect = () => {
    baseRect = base.getBoundingClientRect();
  };

  window.addEventListener('resize', updateRect);
  window.addEventListener('orientationchange', updateRect);

  if (!GS.player) GS.player = {};
  if (!GS.player.moveDir) GS.player.moveDir = { x: 0, y: 0 };

  base.addEventListener('touchstart', (e) => {
    active = true;
    updateRect();
  });

  base.addEventListener('touchmove', (e) => {
    if (!active) return;
    const touch = e.touches[0];
    const x = touch.clientX - (baseRect.left + baseRect.width / 2);
    const y = touch.clientY - (baseRect.top + baseRect.height / 2);
    const dist = Math.sqrt(x * x + y * y);
    const maxDist = baseRect.width / 2 - 10;

    const nx = Math.max(-1, Math.min(1, x / maxDist));
    const ny = Math.max(-1, Math.min(1, y / maxDist));

    GS.player.moveDir = { x: nx, y: ny };

    const moveX = nx * maxDist * 0.5;
    const moveY = ny * maxDist * 0.5;
    thumb.style.transform = `translate(${moveX}px, ${moveY}px)`;
  });

  base.addEventListener('touchend', () => {
    active = false;
    GS.player.moveDir = { x: 0, y: 0 };
    thumb.style.transform = `translate(0px, 0px)`;
  });
}

window.addEventListener('DOMContentLoaded', setupJoystick);

(function patchPlayerUpdateForJoystick() {
  const isMobile = /Mobi|Android/i.test(navigator.userAgent);
  if (!isMobile) return;
  const origUpdate = Player.prototype.update;
  Player.prototype.update = function() {
    if (GS.victoryInProgress) return; // ✨ 승리 애니메이션 중 움직임 정지
    let dx = 0, dy = 0;
    if (typeof this.moveDir === 'object' && (this.moveDir.x !== 0 || this.moveDir.y !== 0)) {
      dx = this.moveDir.x;
      dy = this.moveDir.y;
    } else {
      if (GS.input.up) dy -= 1;
      if (GS.input.down) dy += 1;
      if (GS.input.left) dx -= 1;
      if (GS.input.right) dx += 1;
    }
    if (dx !== 0 && dy !== 0) {
      const invSqrt2 = 0.7071;
      dx *= invSqrt2;
      dy *= invSqrt2;
    }
    this.x += dx * this.stats.moveSpeed * GS.dt;
    this.y += dy * this.stats.moveSpeed * GS.dt;
    if (dx !== 0) this.facing = Math.sign(dx);
    GS.camera.x = M.lerp(GS.camera.x, this.x, 10 * GS.dt);
    GS.camera.y = M.lerp(GS.camera.y, this.y, 10 * GS.dt);
    this.weapons.forEach(w => w.update());
    if (this.hp < this.stats.maxHp && this.stats.regen > 0) {
      this.regenTimer += GS.dt;
      if (this.regenTimer >= 1) {
        this.hp = Math.min(this.stats.maxHp, this.hp + this.stats.regen);
        this.regenTimer = 0;
        GS.damageTexts.push(new DamageText(this.x, this.y, this.stats.regen, false));
        GS.damageTexts[GS.damageTexts.length-1].color = '#00a99c';
      }
    }
    if (this.invulnTimer > 0) this.invulnTimer -= GS.dt;
    if (Math.abs(this.x) > 50000) this.x = 0;
    if (Math.abs(this.y) > 50000) this.y = 0;
  };
})();

</script>
